services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanguard
      POSTGRES_PASSWORD: scanguard_secret
      POSTGRES_DB: scanguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://scanguard:scanguard_secret@db:5432/scanguard
      SYNC_DATABASE_URL: postgresql://scanguard:scanguard_secret@db:5432/scanguard
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-your-api-key-here}
      SECRET_KEY: change-me-in-production-super-secret-key-2024
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  upload_data:
